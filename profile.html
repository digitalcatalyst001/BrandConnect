<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Business Profile | BrandConnect</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="profile-container">

<h2>Create Your Business Profile</h2>

<form id="profileForm">

<input type="text" id="businessName" placeholder="Business Name" required>

<select id="category">
<option>Beauty</option>
<option>Fashion</option>
<option>Food</option>
<option>Events</option>
<option>Tech</option>
</select>

<input type="text" id="location" placeholder="Location (City)" required>

<textarea id="description" placeholder="Business Description"></textarea>

<input type="text" id="services" placeholder="Services (comma separated)">

<input type="text" id="whatsapp" placeholder="WhatsApp Number">

<input type="text" id="image" placeholder="Business Image URL">

<button type="submit">Save Business Profile</button>

</form>

</div>

<script src="main.js"></script>

</body>

</html>

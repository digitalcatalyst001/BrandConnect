<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register Vendor | BrandConnect</title>

<link rel="stylesheet" href="style.css">

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">

</head>

<body>

<div class="auth-container">

<h2>Create Vendor Account</h2>

<form id="registerForm">

<input type="text" id="businessName" placeholder="Business Name" required>

<input type="email" id="email" placeholder="Email" required>

<input type="tel" id="phone" placeholder="Phone Number" required>

<input type="text" id="address" placeholder="Business Address" required>

<input type="password" id="password" placeholder="Password" required>

<h3>Select Subscription Plan</h3>

<div class="plan-grid">

<label class="plan-card">
<input type="radio" name="plan" value="Basic" required>
<h4>Basic</h4>
<p>₦5,000 / month</p>
</label>

<label class="plan-card">
<input type="radio" name="plan" value="Pro">
<h4>Pro</h4>
<p>₦10,000 / month</p>
</label>

<label class="plan-card">
<input type="radio" name="plan" value="Premium">
<h4>Premium</h4>
<p>₦15,000 / month</p>
</label>

</div>

<button type="submit">Create Account</button>

</form>

<p>Already have an account? <a href="login.html">Login</a></p>

</div>

<script src="auth.js"></script>

</body>

</html>

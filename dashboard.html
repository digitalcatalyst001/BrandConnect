<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vendor Dashboard | BrandConnect</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="dashboard">

<h1>Vendor Dashboard</h1>

<div class="stats-grid">

<div class="stat-card">
<h3>Profile Views</h3>
<p>120</p>
</div>

<div class="stat-card">
<h3>Messages</h3>
<p>15</p>
</div>

<div class="stat-card">
<h3>Subscription Plan</h3>
<p id="planName"></p>
</div>

</div>

<div class="subscription-card">

<h2>Subscription Details</h2>

<p>Plan: <strong id="planType"></strong></p>

<p>Start Date: <span id="startDate"></span></p>

<p>Expiry Date: <span id="expiryDate"></span></p>

<button id="upgradeBtn">Upgrade Plan</button>

</div>

</div>

<script src="dashboard.js"></script>

</body>

</html>
